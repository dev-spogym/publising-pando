    raw: "| 정지 플래그 | 실제 회원 상태값이 아니라 활성/만료/예정/임박/홀딩/미등록 상태 위에 적용되는 이용 제한 표시. 주황색 정지 사유 배너와 \"정지 해제\" 버튼은 이 플래그 기준으로 노출 |"
