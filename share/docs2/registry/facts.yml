    raw: "계약 정보 탭 카드 보드: 이용권/락커/운동복 상품을 카드형으로 노출합니다. 각 카드에는 계약 상태 배지(사용중/홀딩/계약 만료임박), 상품명, 기간, 판매 담당자, 계약일, 더보기 메뉴가 표시됩니다."
