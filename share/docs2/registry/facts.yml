    raw: "결제링크 발송 건은 실제 계약금·잔액·할부 계약이 아니므로 미수금으로 집계하지 않습니다. 결제 완료 전에는 회원상세 결제내역에만 미결제 행으로 표시하고, 환불 버튼은 표시하지 않습니다. PAY-06 내부 링크 상태값 발송됨은 화면 문구로 노출하지 않고 재발송·무효화 버튼 노출 기준으로만 사용합니다."
    context: "SCR-M004 회원 상세"
    source: "D02-회원관리/회원관리.md:322"
  -
    kind: "state_line"
