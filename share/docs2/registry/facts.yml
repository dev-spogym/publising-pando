  -
    kind: "core_state_table"
    context: "SCR-S003 결제 처리"
    values:
      -
        value: "결제 대기"
        description: "영수증 첨부 또는 결제 등록 필수값이 미충족된 상태. 결제 등록 버튼 비활성화."
        source: "D03-매출관리/매출관리.md:274"
      -
        value: "결제 등록 준비 완료"
        description: "상품, 혼합결제 행, 포인트 사용액, 결제일시, 영수증 파일이 유효하고 금액 합계가 일치한 상태."
        source: "D03-매출관리/매출관리.md:275"
      -
        value: "포인트 부족"
        description: "보유 포인트가 사용액보다 적을 때 부족액을 붉은색으로 표시하고 결제 등록 버튼 비활성화."
        source: "D03-매출관리/매출관리.md:276"
      -
        value: "결제 총액 불일치"
        description: "혼합결제 행 합계 + 포인트 사용액이 장바구니 합계와 다를 때 차액(부족/초과)을 붉은색으로 표시하고 결제 등록 버튼 비활성화."
        source: "D03-매출관리/매출관리.md:277"
      -
        value: "계약금 등록 중"
        description: "당일 등록 금액과 잔액이 동시에 표시되며, 잔액 처리 방식과 이용권 개시 옵션이 확정되어야 다음 단계로 진행됩니다."
        source: "D03-매출관리/매출관리.md:278"
      -
        value: "VAN/POS 결과 미매칭"
        description: "카드 결제 행이 있으나 승인번호 또는 외부 거래결과가 누락된 상태. 저장은 가능하지만 경고 배지를 표시합니다."
        source: "D03-매출관리/매출관리.md:279"
      -
        value: "귀속 정책 검토 필요"
        description: "법인/홈&오피스/주말/통합 회원권이 포함된 경우 지점 귀속 설정 영역을 강조합니다."
        source: "D03-매출관리/매출관리.md:280"
      -
        value: "결제링크 발송 준비 완료"
        description: "PAY-06 확정 후 회원 연락처, 고정 금액, 만료일시가 모두 유효할 때 발송 버튼이 활성화됩니다. 확정 전에는 상태 자체를 노출하지 않습니다."
        source: "D03-매출관리/매출관리.md:281"
      -
        value: "결제링크 발송됨"
        description: "링크가 전송되었으나 회원이 결제하지 않은 상태입니다. 회원상세 결제내역에는 미결제만 표시하고 환불 버튼은 숨깁니다. 발송됨은 PAY-06 내부 링크 상태값이며 화면 문구로 노출하지 않습니다."
        source: "D03-매출관리/매출관리.md:282"
      -
        value: "결제 등록 중"
        description: "결제 완료 등록 버튼 클릭 후 서버 처리 중. 버튼이 \"등록 중...\"으로 변경되고 재클릭 불가."
        source: "D03-매출관리/매출관리.md:283"
      -
        value: "중복 결제 경고"
        description: "동일 회원·금액 중복 감지 시 경고 다이얼로그 표시."
        source: "D03-매출관리/매출관리.md:284"
      -
        value: "결제 완료"
        description: "결제 등록 성공 후 완료 화면(체크 아이콘 + 후속 버튼)으로 전환하며 회원권/수강권/락커/운동복/일반 상품 구매를 함께 완료."
        source: "D03-매출관리/매출관리.md:285"
    source: "D03-매출관리/매출관리.md:271"
