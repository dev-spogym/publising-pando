    source: "D02-회원관리/회원관리.md:315"
  -
    kind: "state_line"
    label: "결제링크 발송 건은 실제 계약금·잔액·할부 계약이 아니므로 미수금으로 집계하지 않습니다. 결제 완료 전에는 회원상세 결제내역에만 미결제 / 발송"
    values:
      - "미결제"
